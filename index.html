<!DOCTYPE html>
<html lang="en">

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Required for iPhone PWA fullscreen + orientation lock -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        background: #000;
      }

      /* Root container */
      #root {
        height: 100%;
        width: 100%;
        background: #000;

        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      /* Force Expo's internal wrapper to fill the screen */
      #root > div {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      /* HARD portrait-only lock */
      @media (orientation: landscape) {
        body {
          display: none !important;
        }
      }
    </style>
  </head>

    <div id="root"></div>

    <!-- Your Expo web bundle -->
