<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Correct iPhone viewport handling -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Calculator</title>

    <!-- Manifest so iPhone can load your icons -->
    <link rel="manifest" href="manifest.json">

    <!-- Required for iPhone PWA fullscreen + orientation lock -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- GitHub Pages base path -->
    <base href="/calculator/">

    <style>
      /* Remove all browser padding and force full black background */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        overflow: hidden;
      }

      /* Safe area support for iPhone Safari */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        background: #000;
      }

      /* Expo root container */
      #root {
        height: 100%;
        width: 100%;
        background: #000;

        /* Push calculator UI to the bottom */
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      /* Portrait lock for web */
      @media screen and (orientation: landscape) {
        body {
          transform: rotate(90deg);
          transform-origin: center;
          width: 100vh;
          height: 100vw;
          overflow: hidden;
          background: #000;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Expo web bundle -->
    <script src="dist/expo/static/js/web/index-14fe743a44a8d6be23f9601cdc745fd1.js"></script>
  </body>
</html>
