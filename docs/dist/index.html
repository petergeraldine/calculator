<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Calculator</title>

    <base href="/calculator/">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        background: #000;
      }

      /* Root container */
      #root {
        height: 100%;
        width: 100%;
        background: #000;

        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      /* ⭐ NEW: Force Expo's internal container to fill the screen */
      #root > div {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      @media screen and (orientation: landscape) {
        body {
          transform: rotate(90deg);
          transform-origin: center;
          width: 100vh;
          height: 100vw;
          overflow: hidden;
          background: #000;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script src="dist/expo/static/js/web/index-14fe743a44a8d6be23f9601cdc745fd1.js"></script>
  </body>
</html>
